[build]
  # Next.js lives in frontend/ — base + publish must be relative to each other
  base = "frontend"
  command = "cd .. && npm ci --include=dev && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"

[[plugins]]
  package = "@netlify/plugin-nextjs"
